<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Clientes - Logi Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#244BFE'
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Diseño Minimalista - Prueba -->
    <div class="relative z-10 bg-white p-10 rounded-[32px] w-full max-w-sm shadow-[0_20px_60px_rgba(36,75,254,0.15)] border border-brand/10">
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-brand text-white flex items-center justify-center mb-4 shadow-lg shadow-brand/40">
                <i class="fa-solid fa-truck-fast text-2xl"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-none text-center">Portal<br><span class="text-brand text-xl uppercase tracking-widest mt-1 block">Exclusivo de Clientes</span></h2>
        </div>
        
        <form id="client-login-form" onsubmit="handleLoginSubmit(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Usuario de Empresa</label>
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="login-user" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-gray-200 text-slate-800 rounded-xl text-sm focus:border-brand focus:bg-white focus:ring-4 focus:ring-brand/10 outline-none transition-all font-medium" placeholder="Escribe tu usuario">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Contraseña Segura</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="login-pass" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-gray-200 text-slate-800 rounded-xl text-sm focus:border-brand focus:bg-white focus:ring-4 focus:ring-brand/10 outline-none transition-all font-medium" placeholder="••••••••">
                </div>
            </div>
            
            <button id="login-btn" type="submit" class="w-full bg-brand hover:bg-[#1a38c2] text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand/30 transition-all mt-4 text-sm tracking-wide">
                Ingresar al Portal
            </button>
        </form>

        <div id="error-message" class="mt-4 text-center text-xs text-red-500 font-bold hidden bg-red-50 p-2 rounded-lg border border-red-100">
            <!-- Errores aquí -->
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-brand/5 focus:ring-brand/10 -z-10 pointer-events-none"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrMmFzWDWGTNBxriKIlltgKh1HKKgLJpsLso6fOgcHoUUeBfZLnQaN4EFAQSGrIxc_/exec";

        // Redirigir si ya está logueado
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('logi_session') || sessionStorage.getItem('logi_session');
            if(saved) {
                window.location.href = 'index.html';
            }
        });

        async function handleLoginSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-message');
            const originalBtn = btn.innerHTML;
            
            errorDiv.classList.add('hidden');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Validando Acceso...';
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            const nombre = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', nombre, pass }),
                });

                if (!res.ok) throw new Error("Error de red");
                const result = await res.json();
                
                if (result.status === "success") {
                    if (result.user.Rol !== 'CLIENTE') {
                        errorDiv.innerText = "Acceso denegado. Este portal es exclusivo para Empresas Clienta.";
                        errorDiv.classList.remove('hidden');
                        resetBtn();
                        return;
                    }

                    // Guardar sesión persistente para clientes
                    const sessionData = JSON.stringify({ nombre, pass });
                    localStorage.setItem('logi_session', sessionData);
                    
                    // Redirigir a la app principal
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerText = "Usuario o Clave incorrectos.";
                    errorDiv.classList.remove('hidden');
                    resetBtn();
                }
            } catch (err) {
                errorDiv.innerText = "Error crítico. Intenta nuevamente.";
                errorDiv.classList.remove('hidden');
                resetBtn();
            }

            function resetBtn() {
                btn.innerHTML = originalBtn;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
